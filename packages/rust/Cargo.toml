[package]
name = "uncaught"
version = "0.1.0"
edition = "2021"
description = "Local-first, AI-ready error monitoring for Rust"
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
regex = "1"

[features]
default = []
axum = ["dep:axum", "dep:tower", "dep:http"]
actix = ["dep:actix-web"]

[dependencies.axum]
version = "0.7"
optional = true
[dependencies.tower]
version = "0.4"
optional = true
[dependencies.http]
version = "1"
optional = true
[dependencies.actix-web]
version = "4"
optional = true
